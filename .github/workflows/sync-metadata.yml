name: Sync repository metadata

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  administration: write

jobs:
  sync-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Update repository description and homepage
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh repo edit "${{ github.repository }}" \
            --description "ByteKids — платформа для школ программирования: демо, скриншоты, описание функций. SaaS / white-label." \
            --homepage "https://bytekids.online"

      - name: Set repository topics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method PUT "repos/${{ github.repository }}/topics" \
            --input - <<'JSON'
          {"names":["bytekids","coding-school","education","flask","python","saas","school-management","demo","edtech","learning-management-system"]}
          JSON
