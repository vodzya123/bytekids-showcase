name: Sync repository metadata

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  administration: write
  contents: read

jobs:
  sync-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Update description, homepage and topics
        uses: actions/github-script@v7
        with:
          script: |
            const topics = [
              'bytekids',
              'coding-school',
              'education',
              'flask',
              'python',
              'saas',
              'school-management',
              'demo',
              'edtech',
              'learning-management-system',
            ];

            await github.rest.repos.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              description:
                'ByteKids — платформа для школ программирования: демо, скриншоты, описание функций. SaaS / white-label.',
              homepage: 'https://bytekids.online',
              has_discussions: true,
            });

            await github.request('PUT /repos/{owner}/{repo}/topics', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              headers: {
                accept: 'application/vnd.github.mercy-preview+json',
              },
              names: topics,
            });

            core.info('Metadata synced: description, homepage, topics');
